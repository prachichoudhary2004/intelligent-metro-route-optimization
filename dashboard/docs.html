<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Metro Navigator | API Documentation</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
    <style>
        body { background: #fafafa; margin: 0; }
        .header { background: #1b1b1b; padding: 10px 20px; color: white; display: flex; align-items: center; gap: 10px; }
        .header img { height: 30px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://raw.githubusercontent.com/swagger-api/swagger-ui/master/dist/favicon-32x32.png" alt="logo">
        <h2>Metro Navigator API Specification v2.0</h2>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
    <script>
        window.onload = () => {
            window.ui = SwaggerUIBundle({
                url: "/api/openapi.json",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIBundle.presets.middleware
                ]
            });
        };
    </script>
</body>
</html>
